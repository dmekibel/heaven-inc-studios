<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0;url=studio-sim/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Heaven Inc.</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <canvas id="game"></canvas>
    <div id="touch-controls">
        <div id="joystick-zone">
            <div id="joystick-base">
                <div id="joystick-stick"></div>
            </div>
        </div>
        <div id="shoot-buttons">
            <button class="shoot-btn" data-dir="up" id="shoot-up"></button>
            <button class="shoot-btn" data-dir="left" id="shoot-left"></button>
            <button class="shoot-btn" data-dir="right" id="shoot-right"></button>
            <button class="shoot-btn" data-dir="down" id="shoot-down"></button>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
